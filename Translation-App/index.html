<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>QuickTranslate</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>
<body>
  <div class="container-wrapper">
    <div class="language-bar">
      <div class="language-group">
        <select id="sourceLang">
          <option value="auto">Detect language</option>
          <option value="en" selected>English</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ru">Russian</option>
          <option value="zh">Chinese</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
        </select>

        <button id="swapBtn" class="swap-btn" title="Swap languages">
          <i class="fa-solid fa-right-left"></i>
        </button>
      </div>

      <select id="targetLang">
        <option value="en">English</option>
        <option value="es" selected>Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="ru">Russian</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
      </select>

      <button id="themeToggle" class="theme-toggle" title="Toggle light/dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-header">
          <h3>Input</h3>
          <span id="charCount" class="char-count">0 / 500</span>
        </div>
        <textarea
          id="inputText"
          maxlength="500"
          placeholder="Type text here..."
        >Hello, how are you?</textarea>
        <div class="card-actions">
          <button
            id="listenInputBtn"
            class="icon-btn"
            title="Listen to input"
          >
            <i class="fa-solid fa-volume-high"></i>
          </button>
          <button
            id="speechToTextBtn"
            class="icon-btn"
            title="Dictate (speech to text)"
          >
            <i class="fa-solid fa-microphone"></i>
          </button>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Output</h3>
        </div>
        <textarea
          id="outputText"
          readonly
          placeholder="Translation will appear here..."
        ></textarea>
        <div class="card-actions">
          <button id="copyOutputBtn" class="icon-btn" title="Copy output">
            <i class="fa-solid fa-copy"></i>
          </button>
          <button
            id="listenOutputBtn"
            class="icon-btn"
            title="Listen to translation"
          >
            <i class="fa-solid fa-volume-high"></i>
          </button>
        </div>
      </div>
    </div>

    <button id="translateBtn" class="translate-btn">
      <i class="fa-solid fa-language"></i> Translate
    </button>

  <script src="script.js"></script>
</body>
</html>
